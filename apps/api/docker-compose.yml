version: '3.8'

services:
  db:
    container_name: smartpark_db
    image: postgres:15
    restart: always
    ports:
      - 2010:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db_data_smartpark:/var/lib/postgresql/data
volumes:
  db_data_smartpark: